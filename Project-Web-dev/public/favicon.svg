<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f48c66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#df7350;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#3d2b1f" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background Circle with Gradient -->
  <circle cx="256" cy="256" r="246" fill="url(#mainGradient)" stroke="#ffffff" stroke-width="12"/>
  
  <!-- Content Group -->
  <g fill="#ffffff" filter="url(#shadow)">
    <!-- Left Vertical Bar -->
    <rect x="110" y="110" width="60" height="290" rx="30" />
    
    <!-- Right Vertical Bar -->
    <rect x="342" y="110" width="60" height="290" rx="30" />
    
    <!-- Diagonal Bar -->
    <path d="M140 140 L372 370" stroke="#ffffff" stroke-width="60" stroke-linecap="round" />
    
    <!-- The Tilde (~) styled smoothly -->
    <path d="M140 70 Q 200 20, 256 70 T 372 70" 
          fill="none" stroke="#ffffff" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
